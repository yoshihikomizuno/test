<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kindle Auto Screenshot</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Kindle Screenshot</h1>

    <div id="status-container">
      <div id="status" class="status">準備完了</div>
    </div>

    <div class="settings">
      <div class="setting-item">
        <label for="startPage">開始ページ:</label>
        <input type="number" id="startPage" value="1" min="1">
      </div>

      <div class="setting-item">
        <label for="endPage">終了ページ:</label>
        <input type="number" id="endPage" value="10" min="1">
      </div>

      <div class="setting-item">
        <label for="delay">ページ間の待機時間 (ms):</label>
        <input type="number" id="delay" value="1000" min="500" step="100">
      </div>

      <div class="setting-item">
        <label for="quality">画像品質 (0.1-1.0):</label>
        <input type="number" id="quality" value="0.92" min="0.1" max="1.0" step="0.01">
      </div>
    </div>

    <div class="progress-container" id="progressContainer" style="display: none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 0</div>
    </div>

    <div class="buttons">
      <button id="startBtn" class="btn btn-primary">キャプチャ開始</button>
      <button id="stopBtn" class="btn btn-danger" disabled>停止</button>
    </div>

    <div class="buttons">
      <button id="downloadBtn" class="btn btn-success" disabled>PDFダウンロード</button>
    </div>

    <div id="preview-container" style="display: none;">
      <h3>プレビュー</h3>
      <div id="preview"></div>
    </div>

    <div class="info">
      <p>使用方法:</p>
      <ol>
        <li>Kindle Cloud Readerで書籍を開く</li>
        <li>開始・終了ページを設定</li>
        <li>「キャプチャ開始」をクリック</li>
        <li>完了後「PDFダウンロード」</li>
      </ol>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
