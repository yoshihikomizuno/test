<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>制作プレビュー一覧 — MAZAREAL</title>
  <style>
    /* ------------------------------------------------------------
       非公開プレビュー ダッシュボード
       内部確認用のシンプルなツール。外部フォント非依存(システム書体)。
       新しい案件を追加したら <main> にカードを1枚足すだけ。
    ------------------------------------------------------------ */
    :root {
      --bg: #f4f2ec;
      --surface: #ffffff;
      --border: #e2ddd0;
      --ink: #2b2733;
      --muted: #6d6858;
      --accent: #c8442f;      /* マザリアルの温かみのある赤茶 */
      --accent-soft: #f6e4df;
      --ok: #3d9a5a;
      --radius: 12px;
      --shadow: 0 1px 2px rgba(43,39,51,.05), 0 6px 20px rgba(43,39,51,.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1822;
        --surface: #232030;
        --border: #35313f;
        --ink: #ece8f0;
        --muted: #a49eb0;
        --accent: #ff8a6b;
        --accent-soft: #3a2a2a;
        --ok: #5ecf7f;
        --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 24px rgba(0,0,0,.35);
      }
    }
    :root[data-theme="light"] {
      --bg: #f4f2ec; --surface: #ffffff; --border: #e2ddd0; --ink: #2b2733;
      --muted: #6d6858; --accent: #c8442f; --accent-soft: #f6e4df; --ok: #3d9a5a;
      --shadow: 0 1px 2px rgba(43,39,51,.05), 0 6px 20px rgba(43,39,51,.06);
    }
    :root[data-theme="dark"] {
      --bg: #1a1822; --surface: #232030; --border: #35313f; --ink: #ece8f0;
      --muted: #a49eb0; --accent: #ff8a6b; --accent-soft: #3a2a2a; --ok: #5ecf7f;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 24px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Segoe UI", Meiryo, sans-serif;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 56px 24px 80px; }

    header { margin-bottom: 40px; }
    .eyebrow {
      display: inline-block;
      font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--accent); font-weight: 700;
      background: var(--accent-soft);
      padding: 4px 10px; border-radius: 999px;
      margin-bottom: 14px;
    }
    h1 { font-size: 26px; margin: 0 0 8px; letter-spacing: .01em; }
    .sub { color: var(--muted); font-size: 14.5px; margin: 0; }

    .list { display: grid; gap: 16px; margin-top: 8px; }
    .card {
      display: flex; align-items: center; gap: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 22px;
      text-decoration: none; color: inherit;
      transition: transform .15s ease, border-color .15s ease;
    }
    .card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .thumb {
      flex-shrink: 0;
      width: 52px; height: 52px; border-radius: 10px;
      display: grid; place-items: center;
      background: var(--accent-soft); color: var(--accent);
      font-size: 24px; font-weight: 700;
    }
    .card-body { flex: 1; min-width: 0; }
    .card h2 { font-size: 16.5px; margin: 0 0 3px; }
    .card p { font-size: 13.5px; color: var(--muted); margin: 0; }
    .meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .status {
      font-size: 11.5px; font-weight: 600;
      color: var(--ok);
      display: inline-flex; align-items: center; gap: 5px;
    }
    .status::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--ok); }
    .path { font-size: 11.5px; color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .arrow { flex-shrink: 0; color: var(--muted); font-size: 20px; }

    footer {
      margin-top: 44px; padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--muted); font-size: 12.5px;
    }
    footer a { color: var(--accent); }
    @media (prefers-reduced-motion: reduce) {
      .card { transition: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="eyebrow">Private Preview</span>
      <h1>制作プレビュー一覧</h1>
      <p class="sub">株式会社マザリアルの制作物を、社内だけで確認するためのページです。カードを選ぶと各案件のプレビューが開きます。</p>
    </header>

    <!-- 案件を追加するときは、この <main> 内の <article>...</article> を1枚コピーして中身を差し替える -->
    <main class="list">
      <a class="card" data-project href="./mazareal-kids-game/">
        <span class="thumb" aria-hidden="true">🎮</span>
        <span class="card-body">
          <h2>おやこクエスト</h2>
          <p>親がAIでわが子にオリジナルゲームをつくって贈る伴走サービスのLP</p>
          <span class="meta">
            <span class="status">制作中</span>
            <span class="path">/mazareal-kids-game/</span>
          </span>
        </span>
        <span class="arrow" aria-hidden="true">→</span>
      </a>
    </main>

    <footer>
      新しい案件はフォルダを追加すると、ここに自動で並びます。運用手順は
      <a href="./docs/cloudflare-preview-setup.md">docs/cloudflare-preview-setup.md</a> を参照。
    </footer>
  </div>

  <script>
    // OSのテーマに追従（トグルがある環境では data-theme が優先される）
    (function () {
      try {
        var t = localStorage.getItem('preview-theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
</body>
</html>
